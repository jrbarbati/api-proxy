services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: api_proxy
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis

  api-proxy:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: mysql
      DB_PORT: "3306"
      DB_USERNAME: root
      DB_PASSWORD: secret
      DB_NAME: api_proxy
      REDIS_URL: redis:6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-proxy-ui:
    build:
      context: ~/dev/api-proxy-ui
    environment:
      - BACKEND_URL=http://api-proxy-api-proxy-1:8080
    ports:
      - "8081:80"
    depends_on:
      api-proxy:
        condition: service_started

volumes:
  mysql_data:
